name: Backend

on:
  pull_request:
  push:
    branches: [main]

jobs:
  mypy-pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: polymarket_screener
          POSTGRES_USER: polymarket_screener
          POSTGRES_PASSWORD: polymarket_screener
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polymarket_screener -d polymarket_screener"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "false"
      POSTGRES_DB: polymarket_screener
      POSTGRES_USER: polymarket_screener
      POSTGRES_PASSWORD: polymarket_screener
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r backend/requirements-dev.txt
      - name: Ruff
        run: ruff check backend
      - name: Mypy
        run: mypy backend
      - name: Pytest
        run: pytest backend
