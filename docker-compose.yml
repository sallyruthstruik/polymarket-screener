services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polymarket_screener}
      POSTGRES_USER: ${POSTGRES_USER:-polymarket_screener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polymarket_screener}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polymarket_screener} -d ${POSTGRES_DB:-polymarket_screener}"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:26.3-alpine
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-polymarket_screener}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-polymarket_screener}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-polymarket_screener}
    ports:
      - "${CLICKHOUSE_HOST_PORT:-8123}:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "${CLICKHOUSE_USER:-polymarket_screener}", "--password", "${CLICKHOUSE_PASSWORD:-polymarket_screener}", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-development-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      POSTGRES_DB: ${POSTGRES_DB:-polymarket_screener}
      POSTGRES_USER: ${POSTGRES_USER:-polymarket_screener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polymarket_screener}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-polymarket_screener}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-polymarket_screener}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-polymarket_screener}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL-http://localhost:8000}
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  clickhouse_data:
  frontend_node_modules:
